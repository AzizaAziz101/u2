<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>UX Agency Underground — UX Agentur</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0e12;overflow:hidden;font-family:'Courier New',monospace;}
canvas{display:block;width:100vw;height:100vh;}

#vig{position:fixed;inset:0;pointer-events:none;z-index:4;
  background:radial-gradient(ellipse at 50% 48%,transparent 28%,rgba(6,6,10,.2) 56%,rgba(4,4,8,.82) 100%);}

#logo{position:fixed;top:22px;left:24px;z-index:20;pointer-events:none;display:flex;align-items:center;gap:12px;}
/* Roundel */
#roundel{width:36px;height:36px;flex-shrink:0;}
#logo .l1{font-size:13px;letter-spacing:.28em;color:rgba(255,250,245,.82);text-transform:uppercase;}
#logo .l2{font-size:7px;letter-spacing:.22em;color:rgba(220,36,31,.55);text-transform:uppercase;margin-top:4px;}

#hud{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:10;display:flex;gap:24px;align-items:center;pointer-events:none;}
#hud a{color:rgba(255,250,245,.22);text-decoration:none;font-size:9px;letter-spacing:.28em;
  text-transform:uppercase;pointer-events:all;transition:color .22s;cursor:pointer;padding:6px 0;}
#hud a:hover{color:rgba(220,36,31,.75);}
#hud span{color:rgba(255,250,245,.12);font-size:8px;}

#stn{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:10;color:rgba(255,250,245,0);font-size:12px;letter-spacing:.38em;
  text-transform:uppercase;pointer-events:none;transition:color 1.8s;}
#stn.show{color:rgba(255,250,245,.22);}

#nav{position:fixed;right:24px;top:50%;transform:translateY(-50%);z-index:20;
  display:flex;flex-direction:column;gap:0;}
.ni{display:flex;align-items:center;gap:14px;padding:13px 0;cursor:pointer;
  border:none;background:none;transition:opacity .18s;opacity:.36;}
.ni:hover{opacity:.78;}
.ni.on{opacity:1;}
.nb{width:16px;height:2px;background:rgba(255,250,245,.18);flex-shrink:0;transition:all .22s;}
.ni.on .nb{width:26px;background:rgba(220,36,31,.95);}
.ni:hover .nb{background:rgba(255,250,245,.5);}
.nl{font-size:13px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,250,245,.68);white-space:nowrap;transition:color .18s;font-weight:500;}
.ni.on .nl{color:rgba(220,36,31,.98);}



/* ── REF PANEL — left side ── */
#ref{position:fixed;left:0;top:0;bottom:0;z-index:30;
  pointer-events:none;opacity:0;transition:opacity .26s,transform .26s;transform:translateX(-14px);}
#ref.show{opacity:1;pointer-events:all;transform:translateX(0);}
#ref-card{
  width:clamp(260px,80vw,290px);
  height:100%;background:rgba(10,10,14,.94);
  border-right:1px solid rgba(255,250,245,.06);backdrop-filter:blur(16px);
  display:flex;flex-direction:column;overflow:hidden;position:relative;}
#ref-scroll{flex:1;overflow-y:auto;
  padding:clamp(40px,8vw,56px) clamp(16px,6vw,26px) 16px;
  display:flex;flex-direction:column;gap:12px;
  scrollbar-width:thin;scrollbar-color:rgba(220,36,31,.12) transparent;}
#ref-tag{font-size:6px;letter-spacing:.48em;color:rgba(220,36,31,.55);text-transform:uppercase;}
#ref-title{font-size:clamp(13px,4vw,17px);color:rgba(255,250,245,.9);letter-spacing:.02em;line-height:1.2;font-weight:normal;}
#ref-sub{font-size:8px;letter-spacing:.18em;color:rgba(255,250,245,.24);text-transform:uppercase;margin-top:-4px;}
#ref-divider{height:1px;background:rgba(255,250,245,.05);margin:2px 0;}
#ref-desc{font-size:clamp(10px,2.8vw,11px);line-height:1.72;color:rgba(255,250,245,.48);font-family:sans-serif;letter-spacing:.01em;}
#ref-tags{display:flex;flex-wrap:wrap;gap:5px;}
.rt{font-size:7px;letter-spacing:.14em;text-transform:uppercase;padding:4px 9px;
  border:1px solid rgba(255,250,245,.08);border-radius:2px;color:rgba(255,250,245,.28);}
#ref-footer{padding:clamp(12px,4vw,20px) clamp(16px,6vw,26px);border-top:1px solid rgba(255,250,245,.05);display:flex;flex-direction:column;gap:9px;}
#ref-link{display:block;padding:clamp(9px,3vw,13px) 20px;background:rgba(220,36,31,.1);
  border:1px solid rgba(220,36,31,.38);border-radius:4px;color:rgba(220,36,31,.92);
  font-size:9px;letter-spacing:.22em;text-transform:uppercase;text-decoration:none;
  transition:all .2s;text-align:center;font-family:'Courier New',monospace;}
#ref-link:hover{background:rgba(220,36,31,.2);border-color:rgba(220,36,31,.7);}
#ref-close{display:block;padding:clamp(8px,2.5vw,11px) 20px;border:1px solid rgba(255,250,245,.07);
  border-radius:4px;color:rgba(255,250,245,.26);font-size:9px;letter-spacing:.22em;
  text-transform:uppercase;cursor:pointer;transition:all .2s;background:none;
  font-family:'Courier New',monospace;text-align:center;}
#ref-close:hover{border-color:rgba(255,250,245,.22);color:rgba(255,250,245,.58);}
#ref-x{position:absolute;top:12px;right:12px;z-index:2;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:rgba(255,250,245,.26);font-size:13px;border-radius:50%;
  border:1px solid rgba(255,250,245,.07);transition:all .2s;background:rgba(10,10,14,.6);}
#ref-x:hover{color:rgba(255,250,245,.68);border-color:rgba(255,250,245,.22);}

/* ── IMPRESSUM MODAL ── */
#imp{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;transition:opacity .22s;}
#imp.show{opacity:1;pointer-events:all;}
#imp-bg{position:absolute;inset:0;background:rgba(0,0,0,.68);backdrop-filter:blur(6px);}
#imp-box{position:relative;z-index:1;background:rgba(10,10,14,.97);
  border:1px solid rgba(255,250,245,.07);border-radius:8px;
  width:min(460px,88vw);max-height:min(74vh,520px);overflow-y:auto;
  padding:clamp(18px,5vw,32px);
  scrollbar-width:thin;scrollbar-color:rgba(220,36,31,.1) transparent;}
#imp-box h2{font-size:9px;letter-spacing:.42em;color:rgba(220,36,31,.65);text-transform:uppercase;margin-bottom:16px;}
#imp-box h3{font-size:8.5px;letter-spacing:.28em;color:rgba(255,250,245,.38);text-transform:uppercase;margin:14px 0 6px;}
#imp-box p{font-size:clamp(10px,2.8vw,10.5px);line-height:1.82;color:rgba(255,250,245,.36);font-family:sans-serif;}
#imp-box a{color:rgba(220,36,31,.55);text-decoration:none;}
#imp-close{margin-top:20px;display:inline-block;padding:9px 18px;
  border:1px solid rgba(255,250,245,.09);border-radius:4px;
  color:rgba(255,250,245,.33);font-size:9px;letter-spacing:.22em;
  text-transform:uppercase;cursor:pointer;transition:all .2s;background:none;
  font-family:'Courier New',monospace;}
#imp-close:hover{border-color:rgba(255,250,245,.26);color:rgba(255,250,245,.62);}

@media(max-width:500px){
  #nav{right:12px;}
  #ref-card{width:92vw;}
  #hud{gap:14px;}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vig"></div>


<div id="logo">
  <!-- TfL Roundel SVG -->
  <svg id="roundel" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <circle cx="18" cy="18" r="16" fill="#dc241f"/>
    <rect x="2" y="14" width="32" height="8" fill="#003688"/>
    <circle cx="18" cy="18" r="16" fill="none" stroke="#003688" stroke-width="0"/>
    <text x="18" y="20.5" text-anchor="middle" font-size="5.2" font-family="'Courier New',monospace"
      font-weight="bold" fill="white" letter-spacing=".5">STUDIO</text>
  </svg>
  <div><div class="l1">UX Agency Underground</div><div class="l2">UX · Interface · Strategy</div></div>
</div>

<div id="hud">
  <a onclick="showImp('impressum')">Impressum</a>
  <span>·</span>
  <a onclick="showImp('datenschutz')">Datenschutz</a>
</div>

<div id="stn"></div>

<div id="nav">
  <div class="ni on" data-v="standing" onclick="goV('standing')"><div class="nb"></div><div class="nl">Übersicht</div></div>
  <div class="ni"    data-v="seat"     onclick="goV('seat')"    ><div class="nb"></div><div class="nl">E-Commerce</div></div>
  <div class="ni"    data-v="screen"   onclick="goV('screen')"  ><div class="nb"></div><div class="nl">Dashboard</div></div>
  <div class="ni"    data-v="window"   onclick="goV('window')"  ><div class="nb"></div><div class="nl">Mobile App</div></div>
  <div class="ni"    data-v="door"     onclick="goV('door')"    ><div class="nb"></div><div class="nl">Branding</div></div>
</div>

<div id="ref">
  <div id="ref-card">
    <div id="ref-x" onclick="closeRef()">✕</div>
    <div id="ref-scroll">
      <div id="ref-tag">Referenz</div>
      <div id="ref-title">–</div>
      <div id="ref-sub">–</div>
      <div id="ref-divider"></div>
      <div id="ref-desc">–</div>
      <div id="ref-tags"></div>
    </div>
    <div id="ref-footer">
      <a id="ref-link" href="#" target="_blank" rel="noopener">Website ansehen →</a>
      <button id="ref-close" onclick="closeRef()">Schließen</button>
    </div>
  </div>
</div>

<div id="imp">
  <div id="imp-bg" onclick="closeImp()"></div>
  <div id="imp-box">
    <h2 id="imp-heading">–</h2>
    <div id="imp-body"></div>
    <button id="imp-close" onclick="closeImp()">Schließen</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
if(!window.THREE){document.body.innerHTML='<p style="color:#fff;padding:2rem">Three.js konnte nicht geladen werden.</p>';throw new Error('no three');}

var REFS={
  standing:{title:'UX Agency Underground',sub:'UX Agentur · Gesamtüberblick',
    desc:'Wir gestalten digitale Erlebnisse, die Menschen wirklich nutzen wollen. Von der ersten Skizze bis zum fertigen Produkt — strategisch, iterativ, nutzerzentriert.',
    tags:['UX Strategy','Research','Prototyping','Design Systems'],link:'https://example-agency.de',linkLabel:'Mehr erfahren →'},
  seat:{title:'Heindl Watches',sub:'E-Commerce · Shopify Redesign',
    desc:'UX-Redesign eines Schweizer Uhren-Onlineshops. Conversion-Rate +34 % durch optimierten Checkout-Flow und emotionalere Markenkommunikation.',
    tags:['UX Research','Shopify','Conversion','UI Design'],link:'https://heindl-watches.com',linkLabel:'Projekt ansehen →'},
  screen:{title:'Velox Analytics',sub:'SaaS Dashboard · B2B',
    desc:'Analyse-Dashboard für Logistikunternehmen. Rollenbasierte Ansichten und ein Design System für 12 Produktteams.',
    tags:['Dashboard Design','Design System','Figma','Data Viz'],link:'https://velox-analytics.io',linkLabel:'Case Study →'},
  window:{title:'Roam',sub:'iOS & Android · 0→1 Product',
    desc:'Reiseplanung neu gedacht: KI-Empfehlungen, Offline-Karten, Community. 40.000 Downloads in den ersten drei Monaten.',
    tags:['Mobile UX','Research','Prototyping','iOS / Android'],link:'https://roamapp.travel',linkLabel:'App ansehen →'},
  door:{title:'Nordhavn Studio',sub:'Brand Identity · Web',
    desc:'Brand-System für ein Kopenhagener Architekturbüro — Logo, Typographie, Fotografie-Richtlinien, minimalistische Website.',
    tags:['Brand Identity','Web Design','Typography'],link:'https://nordhavn.studio',linkLabel:'Website besuchen →'},
};
function openRef(v){
  var r=REFS[v];if(!r)return;
  document.getElementById('ref-title').textContent=r.title;
  document.getElementById('ref-sub').textContent=r.sub;
  document.getElementById('ref-desc').textContent=r.desc;
  document.getElementById('ref-link').href=r.link;
  document.getElementById('ref-link').textContent=r.linkLabel;
  var tc=document.getElementById('ref-tags');tc.innerHTML='';
  r.tags.forEach(function(t){var d=document.createElement('div');d.className='rt';d.textContent=t;tc.appendChild(d);});
  document.getElementById('ref').classList.add('show');
}
function closeRef(){document.getElementById('ref').classList.remove('show');}

var IMP={
  impressum:{heading:'Impressum',body:'<h3>Angaben gemäß § 5 TMG</h3><p>UX Agency Underground<br>Musterstraße 42<br>10115 Berlin</p><h3>Kontakt</h3><p>E-Mail: <a href="mailto:hallo@studio-underground.de">hallo@studio-underground.de</a><br>Tel: +49 30 123 456 78</p><h3>Verantwortlich</h3><p>Max Mustermann, Geschäftsführer</p><h3>Haftung</h3><p>Inhalte sorgfältig erstellt. Keine Gewähr für Richtigkeit.</p>'},
  datenschutz:{heading:'Datenschutz',body:'<h3>Verantwortlicher</h3><p>UX Agency Underground, Musterstraße 42, 10115 Berlin</p><h3>Datenerhebung</h3><p>Diese Website erhebt keine personenbezogenen Daten. Keine Cookies, kein Tracking.</p><h3>Hosting</h3><p>Server in der EU. Verbindungsdaten werden 7 Tage gespeichert.</p><h3>Ihre Rechte</h3><p>Auskunft, Löschung gemäß DSGVO: <a href="mailto:datenschutz@studio-underground.de">datenschutz@studio-underground.de</a></p>'},
};
window.showImp=function(t){var d=IMP[t];if(!d)return;document.getElementById('imp-heading').textContent=d.heading;document.getElementById('imp-body').innerHTML=d.body;document.getElementById('imp').classList.add('show');};
window.closeImp=function(){document.getElementById('imp').classList.remove('show');};

// ── RENDERER ──────────────────────────────────────────────────
var cv=document.getElementById('c');
var W=window.innerWidth,H=window.innerHeight;
var renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
renderer.setSize(W,H);
renderer.toneMapping=THREE.ReinhardToneMapping;
renderer.toneMappingExposure=1.0;
renderer.shadowMap.enabled=false;

var scene=new THREE.Scene();
scene.background=new THREE.Color(0x0d0e12);
scene.fog=new THREE.FogExp2(0x0d0e12,.03);

var camera=new THREE.PerspectiveCamera(62,W/H,.06,62);
camera.rotation.order='YXZ';

window.addEventListener('resize',function(){
  W=window.innerWidth;H=window.innerHeight;
  renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();
  mEls.forEach(function(m){m.sx=-1;m.sy=-1;});
  needsRender=true;
});

// ── TEXTURES ──────────────────────────────────────────────────
function mkTex(w,h,fn,rS,rT){
  var c=document.createElement('canvas');c.width=w;c.height=h;
  fn(c.getContext('2d'),w,h);
  var t=new THREE.CanvasTexture(c);
  if(rS){t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(rS,rT||rS);}
  return t;
}

// ── London Underground curved wall panels — cream/white curved profile ──
// Walls are the iconic curved cream/off-white enamel panels of the tube
var tWall=mkTex(512,512,function(ctx,w,h){
  // Base — London Underground cream/ivory enamel
  ctx.fillStyle='#e8e4dc';ctx.fillRect(0,0,w,h);
  // Large curved panel sections — slightly varying shades
  for(var x=0;x<w;x+=256)for(var y=0;y<h;y+=160){
    var v=232+(Math.random()*8|0);
    ctx.fillStyle='rgb('+v+','+(v-2)+','+(v-8)+')';
    ctx.fillRect(x+1,y+1,254,158);
    // curved surface highlight (lighter at top of each panel)
    var gh=ctx.createLinearGradient(0,y,0,y+160);
    gh.addColorStop(0,'rgba(255,255,255,.14)');
    gh.addColorStop(.3,'rgba(255,255,255,.06)');
    gh.addColorStop(1,'rgba(0,0,0,.04)');
    ctx.fillStyle=gh;ctx.fillRect(x+1,y+1,254,158);
    // micro surface variation
    for(var ni=0;ni<6;ni++){
      ctx.fillStyle='rgba(255,255,255,.05)';
      ctx.fillRect(x+Math.random()*250,y+Math.random()*155,8+Math.random()*20,1);
    }
  }
  // Panel seams — thicker LU-style
  ctx.strokeStyle='rgba(100,90,80,.18)';ctx.lineWidth=1.2;
  for(var x2=0;x2<w;x2+=256){ctx.beginPath();ctx.moveTo(x2,0);ctx.lineTo(x2,h);ctx.stroke();}
  for(var y2=0;y2<h;y2+=160){ctx.beginPath();ctx.moveTo(0,y2);ctx.lineTo(w,y2);ctx.stroke();}
  // Inner seam shadow
  ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=.5;
  for(var x3=0;x3<w;x3+=256){
    ctx.beginPath();ctx.moveTo(x3+2,0);ctx.lineTo(x3+2,h);ctx.stroke();
  }
  // LU signature blue band at lower dado level
  var gy=ctx.createLinearGradient(0,h*.60,0,h*.665);
  gy.addColorStop(0,'rgba(0,54,136,.0)');
  gy.addColorStop(.25,'rgba(0,54,136,.55)');
  gy.addColorStop(.75,'rgba(0,54,136,.55)');
  gy.addColorStop(1,'rgba(0,54,136,.0)');
  ctx.fillStyle=gy;ctx.fillRect(0,h*.59,w,h*.075);
  // thin red stripe above the blue band
  var gr=ctx.createLinearGradient(0,h*.585,0,h*.598);
  gr.addColorStop(0,'rgba(220,36,31,.0)');
  gr.addColorStop(.4,'rgba(220,36,31,.65)');
  gr.addColorStop(.6,'rgba(220,36,31,.65)');
  gr.addColorStop(1,'rgba(220,36,31,.0)');
  ctx.fillStyle=gr;ctx.fillRect(0,h*.582,w,h*.016);
});

// ── Floor — London Tube black rubber/composite, worn ──
var tFloor=mkTex(512,512,function(ctx,w,h){
  // Base dark charcoal/black rubber matting
  ctx.fillStyle='#1a1814';ctx.fillRect(0,0,w,h);
  // Ribbed anti-slip pattern (transverse ribs)
  for(var y=0;y<h;y+=8){
    ctx.fillStyle='rgba(255,255,255,'+(0.012+Math.random()*.018)+')';
    ctx.fillRect(0,y,w,3);
    ctx.fillStyle='rgba(0,0,0,.15)';
    ctx.fillRect(0,y+3,w,2);
  }
  // wear marks and dirt variation
  for(var i=0;i<400;i++){
    var fx=Math.random()*w,fy=Math.random()*h;
    ctx.fillStyle='rgba(80,70,60,'+(0.02+Math.random()*.06)+')';
    ctx.fillRect(fx,fy,3+Math.random()*14,1+Math.random()*2);
  }
  // slight centre sheen from foot traffic
  var gc=ctx.createLinearGradient(w*.2,0,w*.8,0);
  gc.addColorStop(0,'rgba(255,255,255,0)');
  gc.addColorStop(.5,'rgba(255,255,255,.04)');
  gc.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=gc;ctx.fillRect(0,0,w,h);
},1,5);

// ── Ceiling — curved LU tunnel ceiling, off-white ──
var tCeil=mkTex(256,256,function(ctx,w,h){
  ctx.fillStyle='#d8d4cc';ctx.fillRect(0,0,w,h);
  // ceiling panels with curved shading
  for(var x=0;x<w;x+=128)for(var y=0;y<h;y+=128){
    var v=216+(Math.random()*10|0);
    ctx.fillStyle='rgb('+v+','+(v-2)+','+(v-6)+')';ctx.fillRect(x+1,y+1,126,126);
    // curved profile shading
    var gc2=ctx.createLinearGradient(x,y,x,y+128);
    gc2.addColorStop(0,'rgba(255,255,255,.08)');
    gc2.addColorStop(1,'rgba(0,0,0,.06)');
    ctx.fillStyle=gc2;ctx.fillRect(x+1,y+1,126,126);
  }
  ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=.8;
  for(var x2=0;x2<w;x2+=128){ctx.beginPath();ctx.moveTo(x2,0);ctx.lineTo(x2,h);ctx.stroke();}
  for(var y2=0;y2<h;y2+=128){ctx.beginPath();ctx.moveTo(0,y2);ctx.lineTo(w,y2);ctx.stroke();}
});

// ── Seat — London Underground moquette: red/blue/yellow geometric ──
var tSeat=mkTex(256,256,function(ctx,w,h){
  // Base deep red-blue TfL moquette background
  ctx.fillStyle='#1a0d20';ctx.fillRect(0,0,w,h);
  // Moquette geometric pattern — simplified but evocative
  var cols=['#8b1a2e','#1e3a7a','#c8a020','#5c1220','#162d62','#a07818'];
  // large geometric diamond shapes
  for(var iy=0;iy<h;iy+=16){
    for(var ix=0;ix<w;ix+=16){
      var ci=Math.floor((ix/16+iy/16))%3;
      ctx.fillStyle=cols[ci];
      ctx.fillRect(ix,iy,8,8);
      ctx.fillStyle=cols[ci+3];
      ctx.fillRect(ix+8,iy+8,8,8);
    }
  }
  // weave overlay — fine cross-hatch
  for(var d=0;d<w+h;d+=4){
    ctx.strokeStyle='rgba(255,200,0,.04)';ctx.lineWidth=.4;
    ctx.beginPath();ctx.moveTo(d,0);ctx.lineTo(0,d);ctx.stroke();
    ctx.strokeStyle='rgba(0,40,120,.06)';
    ctx.beginPath();ctx.moveTo(d,h);ctx.lineTo(w,d);ctx.stroke();
  }
  // overall darkening
  ctx.fillStyle='rgba(10,5,18,.35)';ctx.fillRect(0,0,w,h);
});
var MSEAT=new THREE.MeshStandardMaterial({map:tSeat,roughness:.96,metalness:.0});
// LU dark blue-grey metal for frames
var MSMET=new THREE.MeshStandardMaterial({color:0x22283a,metalness:.72,roughness:.42});

// ── Screen textures ──
var tScreenL=mkTex(512,288,function(ctx,w,h){
  ctx.fillStyle='#060912';ctx.fillRect(0,0,w,h);
  // TfL-style header bar
  ctx.fillStyle='#dc241f';ctx.fillRect(0,0,w,28);
  ctx.fillStyle='#f5f0e8';ctx.font='bold 11px monospace';ctx.fillText('VELOX ANALYTICS',14,19);
  var cols=[[20,'3.2M','Nutzer'],[190,'98%','Uptime'],[360,'12','Kunden']];
  cols.forEach(function(c){
    ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(c[0],38,148,76);
    ctx.fillStyle='rgba(220,36,31,.92)';ctx.font='bold 32px monospace';ctx.fillText(c[1],c[0]+12,86);
    ctx.fillStyle='rgba(255,255,255,.38)';ctx.font='10px monospace';ctx.fillText(c[2],c[0]+12,106);
  });
  [.42,.6,.35,.75,.52,.88,.65,1,.78,.92,.6,.82].forEach(function(v,i){
    var bh=Math.round(v*58),bx=20+i*40,by=h-16-bh;
    ctx.fillStyle='rgba(220,36,31,'+(0.18+v*.52)+')';
    ctx.fillRect(bx,by,28,bh);
  });
  ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(0,h-16,w,1);
  ctx.fillStyle='rgba(255,255,255,.14)';ctx.font='9px monospace';ctx.fillText('velox-analytics.io',w-148,h-4);
  for(var s=0;s<h;s+=2){ctx.fillStyle='rgba(0,0,0,.03)';ctx.fillRect(0,s,w,1);}
});

var tScreenR=mkTex(512,288,function(ctx,w,h){
  ctx.fillStyle='#070610';ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#003688';ctx.fillRect(0,0,w,28);
  ctx.fillStyle='#f5f0e8';ctx.font='bold 11px monospace';ctx.fillText('HEINDL WATCHES',14,19);
  var cx=140,cy=168,r=88;
  ctx.strokeStyle='rgba(200,160,32,.38)';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='rgba(200,160,32,.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx,cy,r-14,0,Math.PI*2);ctx.stroke();
  for(var tk=0;tk<12;tk++){
    var a=tk/12*Math.PI*2-Math.PI/2;
    ctx.strokeStyle='rgba(200,160,32,.6)';ctx.lineWidth=tk%3===0?2:.8;
    ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*(r-5),cy+Math.sin(a)*(r-5));
    ctx.lineTo(cx+Math.cos(a)*(r-18),cy+Math.sin(a)*(r-18));ctx.stroke();
  }
  ctx.strokeStyle='rgba(200,160,32,.85)';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,cy-54);ctx.stroke();
  ctx.strokeStyle='rgba(200,160,32,.7)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+38,cy+22);ctx.stroke();
  ctx.fillStyle='rgba(220,36,31,.95)';ctx.font='bold 44px monospace';ctx.fillText('+34%',290,120);
  ctx.fillStyle='rgba(255,255,255,.38)';ctx.font='11px monospace';ctx.fillText('Conversion Rate',290,142);
  ctx.fillStyle='rgba(200,160,32,.7)';ctx.font='bold 22px monospace';ctx.fillText('Shopify',290,192);
  ctx.fillStyle='rgba(255,255,255,.25)';ctx.font='10px monospace';ctx.fillText('Redesign 2024',290,212);
  ctx.fillStyle='rgba(255,255,255,.1)';ctx.font='9px monospace';ctx.fillText('heindl-watches.com',w-200,h-4);
  for(var s2=0;s2<h;s2+=2){ctx.fillStyle='rgba(0,0,0,.028)';ctx.fillRect(0,s2,w,1);}
});

// ── SCENE ─────────────────────────────────────────────────────
// London Tube carriage: narrower, curved profile
var CL=20,CW=1.35,CH=2.1,FY=-1.0,CYL=FY+CH;

function mat(o){return new THREE.MeshStandardMaterial(o);}
function addP(w,h,m,px,py,pz,rx,ry){
  var o=new THREE.Mesh(new THREE.PlaneGeometry(w,h),m);
  o.position.set(px,py,pz);if(rx)o.rotation.x=rx;if(ry)o.rotation.y=ry;scene.add(o);return o;
}
function addB(w,h,d,m,px,py,pz){
  var o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);
  o.position.set(px,py,pz);scene.add(o);return o;
}

// ── SURFACES ──────────────────────────────────────────────────
// Floor — dark rubber, matte
addP(CW*2,CL+3,mat({map:tFloor,roughness:.98,metalness:.0,color:0x888880}),0,FY,-(CL/2-2),-Math.PI/2);
// Ceiling — curved cream
addP(CW*2,CL+3,mat({map:tCeil,roughness:.80,color:0xd5d0c8}),0,CYL,-(CL/2-2),Math.PI/2);

// Walls: cream enamel panels — LU carriage style
var mWall=mat({map:tWall,roughness:.72,metalness:.04});
// Dark blue upper panel strip (above dado)
var mDarkUpper=mat({color:0x0a0d1a,roughness:.80,metalness:.05});
var wallH=CH*.62,panH=CH*.38;
addP(CL+3,wallH,mWall,-CW,FY+wallH/2,-(CL/2-2),0,Math.PI/2);
addP(CL+3,panH,mDarkUpper,-CW,FY+wallH+panH/2,-(CL/2-2),0,Math.PI/2);
addP(CL+3,wallH,mWall,CW,FY+wallH/2,-(CL/2-2),0,-Math.PI/2);
addP(CL+3,panH,mDarkUpper,CW,FY+wallH+panH/2,-(CL/2-2),0,-Math.PI/2);

// End walls
var mEnd=mat({color:0x14121a,roughness:.88,metalness:.04});
addP(CW*2,CH,mEnd,0,FY+CH/2,-CL+2);
var bwm=new THREE.Mesh(new THREE.PlaneGeometry(CW*2,CH),mEnd);
bwm.rotation.y=Math.PI;bwm.position.set(0,FY+CH/2,3.8);scene.add(bwm);

// ── STRUCTURAL RIBS — LU aluminium body formers ───────────────
// LU cars have distinctive curved ceiling ribs
var mRib=mat({color:0x8890a0,metalness:.82,roughness:.28});
var mRibDark=mat({color:0x303848,metalness:.58,roughness:.50});
for(var rz=-CL+2;rz<=2;rz+=2.4){
  // Ceiling edge brackets
  addB(.45,.03,.05,mRib,-CW+.225,CYL,rz);
  addB(.45,.03,.05,mRib,CW-.225,CYL,rz);
  // Slim vertical pillars
  addB(.024,CH,.04,mRib,-CW,FY+CH/2,rz);
  addB(.024,CH,.04,mRib,CW,FY+CH/2,rz);
  addB(.005,CH,.044,mRibDark,-CW+.014,FY+CH/2,rz);
  addB(.005,CH,.044,mRibDark,CW-.014,FY+CH/2,rz);
  // Dado rail — blue stripe profile
  addB(.018,CH*.08,.04,mat({color:0x003688,metalness:.65,roughness:.35}),-CW,FY+wallH-.02,rz);
  addB(.018,CH*.08,.04,mat({color:0x003688,metalness:.65,roughness:.35}),CW,FY+wallH-.02,rz);
}

// ── DOOR — LU sliding plug door, double leaf ──────────────────
var mDoor=mat({color:0x1c1a26,metalness:.62,roughness:.48});
var mDoorGlass=mat({color:0x03060e,transparent:true,opacity:.82,roughness:.02,metalness:.22});
var mDoorFrame=mat({color:0x14121c,metalness:.72,roughness:.38});
// outer frame
addB(.036,2.02,.12,mDoorFrame,-.50,FY+1.01,-CL+2.02);
addB(.036,2.02,.12,mDoorFrame,.50,FY+1.01,-CL+2.02);
addB(1.04,.036,.12,mDoorFrame,0,FY+2.02,-CL+2.02);
// two door panels
addB(.46,1.92,.042,mDoor,-.48,FY+.96,-CL+2.04);
addB(.46,1.92,.042,mDoor,.48,FY+.96,-CL+2.04);
// gap strip — black rubber seal
addB(.018,1.92,.042,mat({color:0x02020a,metalness:.88}),0,FY+.96,-CL+2.03);
// door windows with yellow hazard frame (LU style)
[-.48,.48].forEach(function(dx){

  dg.position.set(dx,FY+1.65,-CL+2.07);scene.add(dg);

});

// ── WINDOWS — LU style: horizontal rectangular, slim frame ────
var mWF=mat({color:0x1c2030,metalness:.65,roughness:.48});
var mWG=mat({color:0x010306,transparent:true,opacity:.88,roughness:.02,metalness:.35,depthWrite:false});

[-1.0,-3.2,-5.6,-10.4,-12.8,-15.2].forEach(function(wz){

});
// Right wall windows
[-1.0,-5.6,-8.0,-10.4,-12.8,-15.2].forEach(function(wz){

  addB(.052,.68,1.12,mat({color:0x0c1018,metalness:.42,roughness:.68}),CW-.028,FY+1.18,wz);

});

// ── SEATS — London Tube transverse 2+2 ────────────────────────
// LU seats face each other across narrow aisle (longitudinal banks + some transverse)
// We do forward-facing 2+2 pairs similar to District/Circle line
var SW=.40,SD=.36,SG=.04,WG=.06;
var SXL1=-CW+WG+SW/2,SXL2=-CW+WG+SW+SG+SW/2;
var SXR1=CW-WG-SW/2,SXR2=CW-WG-SW-SG-SW/2;
var PITCH=SD*2+0.52+0.55;

function addSeat(x,z,faceFwd){
  var bz=z+(faceFwd?SD/2-0.02:-(SD/2-0.02));
  // cushion — LU moquette
  var cu=new THREE.Mesh(new THREE.BoxGeometry(SW,.058,SD),MSEAT);
  cu.position.set(x,FY+.38,z);scene.add(cu);
  // front lip
  var lip=new THREE.Mesh(new THREE.BoxGeometry(SW,.018,.018),
    mat({color:0x28243a,roughness:.88,metalness:.02}));
  lip.position.set(x,FY+.348,z+(faceFwd?SD/2:-(SD/2)));scene.add(lip);
  // backrest
  var ba=new THREE.Mesh(new THREE.BoxGeometry(SW,.52,.05),MSEAT);
  ba.position.set(x,FY+.66,bz);scene.add(ba);
  // LU-style top grab rail on backrest
  var cap=new THREE.Mesh(new THREE.BoxGeometry(SW,.018,.055),
    mat({color:0x1e1c2c,roughness:.88,metalness:.04}));
  cap.position.set(x,FY+.92,bz);scene.add(cap);
  // outer armrest/panel — LU blue-grey frame
  var outerX=x+(x<0?-SW/2:SW/2);
  addB(.03,.11,SD+.04,MSMET,outerX,FY+.39,z);
  addB(.038,.015,SD+.02,mat({color:0x181626,roughness:.85,metalness:.02}),outerX,FY+.45,z);
}
for(var pz=-.4;pz>-CL+2.5;pz-=PITCH){
  var zA=pz,zB=pz-SD-0.52;
  addSeat(SXL1,zA,true);addSeat(SXL2,zA,true);
  addSeat(SXL1,zB,false);addSeat(SXL2,zB,false);
  addSeat(SXR1,zA,true);addSeat(SXR2,zA,true);
  addSeat(SXR1,zB,false);addSeat(SXR2,zB,false);
  // centre dividers
  [[SXL1+SW/2+SG/2,zA],[SXL1+SW/2+SG/2,zB],[SXR2+SW/2+SG/2,zA],[SXR2+SW/2+SG/2,zB]].forEach(function(p){
    var dv=new THREE.Mesh(new THREE.BoxGeometry(.03,.11,SD),MSMET);
    dv.position.set(p[0],FY+.39,p[1]);scene.add(dv);
  });
}

// ── GRAB POLES — LU stainless steel vertical poles ───────────
var mPole=mat({color:0xd8d4cc,metalness:.94,roughness:.08});
// Yellow rubber grip rings — LU characteristic
var mGrip=mat({color:0xe8c000,metalness:.22,roughness:.65});
// Overhead horizontal rail along ceiling edge (LU) — ONLY wall-side, not crossing
var mRail=mat({color:0xc8c4bc,metalness:.88,roughness:.14});
// Longitudinal rail along each wall at ceiling — 1 per side
var railGeo=new THREE.CylinderGeometry(.014,.014,CL,10);
var railL=new THREE.Mesh(railGeo,mRail);
railL.rotation.x=Math.PI/2;railL.position.set(-CW+.14,CYL-.08,-(CL/2-2));scene.add(railL);
var railR=new THREE.Mesh(railGeo,mRail);
railR.rotation.x=Math.PI/2;railR.position.set(CW-.14,CYL-.08,-(CL/2-2));scene.add(railR);

var POLE_X=0.22;
// Pole runs full height with flanges top and bottom
var POLE_H=CH*.88;
var POLE_BOT=FY+CH*.06;  // bottom flange y
var POLE_TOP=FY+CH*.94;  // top flange y
var mFlange=mat({color:0xc8c4bc,metalness:.90,roughness:.18});
for(var pz2=1.0;pz2>-CL+1;pz2-=2.4){
  [-POLE_X,POLE_X].forEach(function(px){
    // main vertical pole — full height
    var p=new THREE.Mesh(new THREE.CylinderGeometry(.014,.014,POLE_H,12),mPole);
    p.position.set(px,FY+CH*.50,pz2);scene.add(p);
    // ── ceiling flange (rosette) — wider disc at top ──
    var fTop=new THREE.Mesh(new THREE.CylinderGeometry(.038,.038,.022,16),mFlange);
    fTop.position.set(px,POLE_TOP,pz2);scene.add(fTop);
    // small collar ring just below ceiling flange
    var cTop=new THREE.Mesh(new THREE.CylinderGeometry(.022,.022,.028,12),mFlange);
    cTop.position.set(px,POLE_TOP-.026,pz2);scene.add(cTop);
    // ── floor flange (rosette) — wider disc at bottom ──
    var fBot=new THREE.Mesh(new THREE.CylinderGeometry(.040,.040,.024,16),mFlange);
    fBot.position.set(px,POLE_BOT,pz2);scene.add(fBot);
    // small collar ring just above floor flange
    var cBot=new THREE.Mesh(new THREE.CylinderGeometry(.024,.024,.028,12),mFlange);
    cBot.position.set(px,POLE_BOT+.028,pz2);scene.add(cBot);
    // yellow rubber grip ring mid-height
    var yb=new THREE.Mesh(new THREE.CylinderGeometry(.020,.020,.060,12),mGrip);
    yb.position.set(px,FY+CH*.52,pz2);scene.add(yb);
    // second grip ring lower third
    var yb2=new THREE.Mesh(new THREE.CylinderGeometry(.020,.020,.050,12),mGrip);
    yb2.position.set(px,FY+CH*.28,pz2);scene.add(yb2);
  });
}

// ── LED / FLUORESCENT LIGHTING — LU overhead strip lights ────
var mFluor=mat({color:0xfff8f0,emissive:0xfff2e0,emissiveIntensity:.65,roughness:.4});
var mFluorHousing=mat({color:0x2a2838,metalness:.50,roughness:.65});
var LC=new THREE.Color(1,.94,.82); // warm fluorescent

for(var lz=.5;lz>-CL+1;lz-=3.6){
  // housing
  addB(.18,.035,.75,mFluorHousing,0,CYL-.005,lz);
  // tube

}

// ── LIGHTING ──────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a120a,3.8));
scene.add(new THREE.AmbientLight(0x04060e,.6));
var doorGlow=new THREE.PointLight(0x20100a,.28,4.0);doorGlow.position.set(0,FY+1.4,-CL+3);scene.add(doorGlow);

// ── SCREENS ───────────────────────────────────────────────────
var sML=new THREE.Mesh(new THREE.PlaneGeometry(1.04,.58),mat({map:tScreenL,emissive:0x040810,emissiveIntensity:.92,roughness:.04}));
sML.rotation.y=Math.PI/2;sML.position.set(-CW+.022,FY+1.50,-8.0);scene.add(sML);
addB(.026,.64,1.08,mat({color:0x0a0c14,metalness:.74,roughness:.40}),-CW,FY+1.50,-8.0);

sMR.rotation.y=-Math.PI/2;sMR.position.set(CW-.022,FY+1.50,-3.2);scene.add(sMR);
addB(.026,.64,1.08,mat({color:0x0e0c0a,metalness:.74,roughness:.40}),CW,FY+1.50,-3.2);
var sgR=new THREE.PointLight(0x220c04,.45,2.8);sgR.position.set(CW-.55,FY+1.50,-3.2);scene.add(sgR);

// ── LU MAP STRIP — the iconic tube map above windows ──────────
// Simplified representation — a thin illuminated panel each side
var mMapStrip=mat({color:0xf5f0e8,emissive:0xede8e0,emissiveIntensity:.18,roughness:.65});
[-1.8,-4.2,-6.6,-9.0,-11.4,-13.8].forEach(function(az){
  addB(.022,.14,.88,mMapStrip,-CW,FY+1.84,az);
  addB(.022,.14,.88,mMapStrip,CW,FY+1.84,az);
});

// ── TUNNEL — London Underground circular tunnel ───────────────
var tnl=new THREE.Mesh(
  new THREE.CylinderGeometry(3.2,3.2,180,12,1,true),
  mat({color:0x060608,side:THREE.BackSide,roughness:1})
);
tnl.rotation.x=Math.PI/2;tnl.position.set(0,FY+.2,-55);scene.add(tnl);
// tunnel wall lights — LU has strip lighting at rail level
for(var ti=0;ti<18;ti++){

// ── VIEWS ──────────────────────────────────────────────────────
var VIEWS={
  standing:{pos:[0,      FY+.92,  1.4],    look:[0,      FY+.88,-14]},
  seat:    {pos:[CW-.8,  FY+1.50,-3.2],    look:[CW+.1,  FY+1.50,-3.2]},
  screen:  {pos:[-CW+.85,FY+1.50,-8.0],    look:[-CW-.1, FY+1.50,-8.0]},
  window:  {pos:[-CW+.16,FY+1.50, -3.8],    look:[CW-.2,  FY+1.46, -14]},
  door:    {pos:[0,      FY+.92, -CL+4.5], look:[0,      FY+.90,-CL-.5]},
};
var curV='standing';
var tP=VIEWS.standing.pos.slice(),tL=VIEWS.standing.look.slice();
camera.position.set(tP[0],tP[1],tP[2]);
camera.lookAt(new THREE.Vector3(tL[0],tL[1],tL[2]));

window.goV=function(name){
  if(!VIEWS[name])return;
  if(name===curV){openRef(name);return;}
  curV=name;
  tP=VIEWS[name].pos.slice();tL=VIEWS[name].look.slice();
  document.querySelectorAll('.ni').forEach(function(d){d.classList.toggle('on',d.dataset.v===name);});
  needsRender=true;
  if(window._refTimer)clearTimeout(window._refTimer);
  window._refTimer=setTimeout(function(){openRef(name);},700);
};

// ── MARKERS removed — navigation via right-side panel only ─────
var mEls=[];
var cP=new THREE.Vector3(tP[0],tP[1],tP[2]);
var cLv=new THREE.Vector3(tL[0],tL[1],tL[2]);
function updMK(){}

// ── STATIONS ───────────────────────────────────────────────────
var stnEl=document.getElementById('stn');
var STNS=['KING\'S CROSS','OXFORD CIRCUS','BANK','WATERLOO','BAKER STREET','CANARY WHARF','LONDON BRIDGE'];
var stIdx=0,lastStT=-25;
function showStn(){
  stnEl.textContent=STNS[stIdx%STNS.length];stnEl.classList.add('show');
  setTimeout(function(){stnEl.classList.remove('show');},3000);stIdx++;
}

// ── ANIMATE ────────────────────────────────────────────────────
var clock=new THREE.Clock(),T=0,tnlOff=0;
var tPv=new THREE.Vector3(),tLv=new THREE.Vector3();
var needsRender=true;
var _cPprev=new THREE.Vector3(),_cLprev=new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  var dt=Math.min(clock.getDelta(),.05);T+=dt;

  var cyc=T%35,spd=14;
  if(cyc>28)spd=14*Math.max(0,(35-cyc)/7);
  else if(cyc<5)spd=14*Math.min(1,cyc/5);
  if(spd<1.2&&T-lastStT>10){lastStT=T;showStn();}

  tPv.set(tP[0],tP[1],tP[2]);tLv.set(tL[0],tL[1],tL[2]);
  _cPprev.copy(cP);_cLprev.copy(cLv);
  cP.lerp(tPv,.06);cLv.lerp(tLv,.06);

  var moving=(_cPprev.distanceToSquared(cP)>1e-8||_cLprev.distanceToSquared(cLv)>1e-8);
  if(moving)needsRender=true;

  if(spd>0.5){
    tnlOff=(tnlOff+spd*dt)%7;
    tnl.position.z=-55+tnlOff;
    needsRender=true;
  }

  if(needsRender){
    camera.position.copy(cP);
    camera.lookAt(cLv);
    camera.rotation.z=0;
    updMK();
    renderer.render(scene,camera);
    if(!moving&&spd<=0.5)needsRender=false;
  }
}
animate();
</script>
