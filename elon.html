<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TACTICAL_INTELLIGENCE_GER_2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --alert-red: #ff3e3e;
            --dim-gray: #333;
            --bg-black: #080808;
            --data-green: #00ff66;
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            display: grid;
            grid-template-columns: 450px 1fr;
            height: 100vh;
            overflow: hidden;
            font-size: 12px;
        }

        /* --- LEFT PANEL: MISSION CONTROL --- */
        .sidebar {
            border-right: 1px solid var(--dim-gray);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: linear-gradient(90deg, #0a0a0a 0%, #050505 100%);
        }

        .header {
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .header h1 { font-size: 14px; margin: 0; letter-spacing: 3px; }

        .system-stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
            color: var(--dim-gray); font-size: 10px;
        }

        .data-block {
            border: 1px solid var(--dim-gray);
            padding: 15px;
            background: rgba(255,255,255,0.02);
            display: none;
            overflow-y: auto;
            max-height: 75vh;
        }

        /* Custom Scrollbar for Intelligence Feed */
        .data-block::-webkit-scrollbar { width: 4px; }
        .data-block::-webkit-scrollbar-thumb { background: var(--neon-blue); }

        .company-entry {
            margin-bottom: 30px;
            border-left: 2px solid var(--neon-blue);
            padding-left: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.05);
        }

        .company-name { font-weight: 700; color: var(--neon-blue); margin-bottom: 5px; font-size: 14px; }
        .tag-row { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .tag { font-size: 9px; background: var(--dim-gray); padding: 2px 6px; border-radius: 2px; text-transform: uppercase; }

        .potential-box {
            background: rgba(0, 255, 102, 0.05);
            border: 1px solid var(--data-green);
            padding: 10px;
            margin-top: 10px;
            font-size: 11px;
            color: #fff;
            line-height: 1.4;
        }

        .potential-label {
            color: var(--data-green);
            font-weight: bold;
            margin-bottom: 4px;
            display: block;
            text-transform: uppercase;
        }

        /* --- MAIN VIEWPORT: TACTICAL MAP --- */
        .viewport {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg { height: 80vh; width: 80%; }

        .germany-poly {
            fill: none;
            stroke: var(--dim-gray);
            stroke-width: 1;
        }

        .node {
            fill: #000;
            stroke: var(--neon-blue);
            stroke-width: 2;
            cursor: pointer;
            transition: 0.2s;
        }

        .node:hover, .node-active {
            fill: var(--neon-blue);
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        .crosshair {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.03);
        }
    </style>
</head>

        function getTele(idx) {
            document.getElementById('selection-hint').style.display = 'none';
            const display = document.getElementById('data-display');
            display.style.display = 'block';
            
            const node = nodes[idx];
            document.getElementById('region-title').innerText = node.id;
            
            const container = document.getElementById('company-container');
            container.innerHTML = '';
            
            node.units.forEach(u => {
                const div = document.createElement('div');
                div.className = 'company-entry';
                div.innerHTML = `
                    <div class="company-name">${u.name}</div>
                    <div class="tag-row">
                        <span class="tag">${u.focus}</span>
                        <span class="tag">${u.tech}</span>
                    </div>
                    <div style="font-size:11px; color:#ddd; font-weight: bold; margin-bottom: 5px;">${u.pot}</div>
                    <div class="potential-box">
                        <span class="potential-label">Strategic Forecast 2026-2030:</span>
                        ${u.eval}
                    </div>
                `;
                container.appendChild(div);
            });

            // Mark node as active
            document.querySelectorAll('.node').forEach(n => n.classList.remove('node-active'));
            const ids = ['node-muc', 'node-str', 'node-bi', 'node-ber'];
            document.getElementById(ids[idx]).classList.add('node-active');
